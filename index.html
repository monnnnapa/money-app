<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:sans-serif;
background:#f4f6f8;
padding:20px;
}

h1{
margin-bottom:10px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.balance{
font-size:36px;
font-weight:bold;
color:#2c7be5;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ddd;
}

button{
margin-top:10px;
padding:10px;
border:none;
border-radius:8px;
background:#2c7be5;
color:white;
width:100%;
}

.charts{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.charts canvas{
width:100%;
max-width:350px;
}

#history{
display:none;
margin-top:10px;
}

.popup{

position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,0,0,0.2);
display:none;

}

.popup button{
background:#555;
}

</style>

</head>

<body>

<h1>💰 Money Tracker</h1>

<div class="card">

เงินคงเหลือ

<div class="balance" id="balance">0</div>

</div>

<div class="card">

<h2>เพิ่มรายการ</h2>

<select id="type">
<option value="income">รายรับ</option>
<option value="expense">รายจ่าย</option>
</select>

<select id="category">

<option value="food">กิน</option>
<option value="travel">เที่ยว</option>
<option value="fuel">น้ำมัน</option>
<option value="future">เก็บอนาคต</option>

</select>

<input id="amount" placeholder="จำนวนเงิน">

<button onclick="save()">บันทึก</button>

</div>

<div class="card">

<h2>สัดส่วนการเงิน</h2>

<div class="charts">

<div>
<h4>ค่าใช้จ่าย</h4>
<canvas id="expenseChart"></canvas>
</div>

<div>
<h4>เงินเก็บ</h4>
<canvas id="savingChart"></canvas>
</div>

</div>

</div>

<div class="card">

<h2>เป้าหมาย</h2>

<canvas id="goalChart"></canvas>

</div>

<div class="card">

<button onclick="toggleHistory()">ดูประวัติ</button>

<div id="history"></div>

</div>

<div class="popup" id="popup">

<h2>บันทึกแล้ว ✅</h2>

<button onclick="closePopup()">ปิด</button>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzQfJcKY7ibv6Vl1szhQIoiNPGsL0LoH1EeIT9FIdqjgywLuY6cNK1BvYnZUjtwwqgqhg/exec"

let expenseChart
let savingChart
let goalChart

function updateCategory(){

const type=document.getElementById("type").value
const category=document.getElementById("category")

if(type==="expense"){

category.innerHTML=`

<option value="food">กิน</option>
<option value="travel">เที่ยว</option>
<option value="fuel">น้ำมัน</option>

`

}

if(type==="income"){

category.innerHTML=`

<option value="house">บ้าน</option>
<option value="car">รถ</option>
<option value="kid">ลูก</option>
<option value="saving">ออม</option>

`

}

}

updateCategory()

async function loadGoals(){

const res = await fetch(API + "?sheet=goals")
const data = await res.json()

drawGoalChart(data)

}
  
async function load(){

const res=await fetch(API)

const data=await res.json()

let income=0
let expense=0

let food=0
let travel=0
let fuel=0

let house=0
let car=0
let kid=0
let saving=0

let historyHTML=""

data.forEach(t=>{

const amount=Number(t.amount)

if(t.type==="income"){

income+=amount

if(t.category==="house") house+=amount
if(t.category==="car") car+=amount
if(t.category==="kid") kid+=amount
if(t.category==="saving") saving+=amount

}

if(t.type==="expense"){

expense+=amount

if(t.category==="food") food+=amount
if(t.category==="travel") travel+=amount
if(t.category==="fuel") fuel+=amount

}

historyHTML+=`

<div>
${t.date} | ${t.category} | ${t.amount}
</div>

`

})

document.getElementById("balance").innerText=income-expense

document.getElementById("history").innerHTML=historyHTML

drawExpenseChart(food,travel,fuel)

drawSavingChart(house,car,kid,saving)

drawGoalChart(house,car,kid)

}

function drawExpenseChart(food,travel,fuel){

if(expenseChart) expenseChart.destroy()

expenseChart=new Chart(

document.getElementById("expenseChart"),

{
type:"pie",

data:{
labels:["กิน","เที่ยว","น้ำมัน"],

datasets:[{

data:[food,travel,fuel]

}]

}

}

)

}

function drawSavingChart(house,car,kid,saving){

if(savingChart) savingChart.destroy()

savingChart=new Chart(

document.getElementById("savingChart"),

{
type:"pie",

data:{
labels:["บ้าน","รถ","ลูก","ออม"],

datasets:[{

data:[house,car,kid,saving]

}]

}

}

)

}

function drawGoalChart(goals){

if(goalChart) goalChart.destroy()

const labels = goals.map(g => g.name)
const saved = goals.map(g => Number(g.saved))
const target = goals.map(g => Number(g.target))

goalChart = new Chart(

document.getElementById("goalChart"),

{
type: "bar",

data:{

labels: labels,

datasets:[

{
label:"เป้าหมาย",
data: target,
backgroundColor:"#e0e0e0"
},

{
label:"เงินที่เก็บ",
data: saved,
backgroundColor:"#2c7be5"
}

]

},

options:{

indexAxis:'y',

responsive:true,

plugins:{
legend:{
position:'bottom'
}
}

}

}

)

}

async function save(){

const type=document.getElementById("type").value
const category=document.getElementById("category").value
const amount=document.getElementById("amount").value

await fetch(API,{

method:"POST",

body:JSON.stringify({

type:type,
category:category,
amount:amount,
date:new Date().toLocaleDateString()

})

})

document.getElementById("popup").style.display="block"

loadGoals()

}

function closePopup(){

document.getElementById("popup").style.display="none"

}

function toggleHistory(){

const el=document.getElementById("history")

if(el.style.display==="none"){

el.style.display="block"

}else{

el.style.display="none"

}

}

loadGoals()

</script>

</body>
</html>
