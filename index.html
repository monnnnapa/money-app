<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Money App</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<h2>เงินกองกลางของเรา</h2>

<div class="totalBox">
฿ <span id="totalMoney">0</span>
</div>

<div class="card">

<canvas id="pieChart"></canvas>

<div id="categoryList"></div>

</div>

<h3>เป้าหมายร่วมกัน</h3>

<div id="goalList"></div>

<h3>การใช้เงินกองกลาง</h3>

<div id="transactionList"></div>

<button class="addBtn" onclick="addTransaction()">
+ เพิ่มรายการ
</button>
<div class="formBox">

<select id="type">
<option value="expense">รายจ่าย</option>
<option value="income">รายรับ</option>
</select>

<select id="category">
<option>ค่ากิน</option>
<option>ค่าน้ำมัน</option>
<option>ค่าเที่ยว</option>
<option>เงินเก็บ</option>
</select>

<input id="amount" type="number" placeholder="จำนวนเงิน">

<button onclick="saveTransaction()">
บันทึก
</button>

</div>
</div>

<script src="app.js"></script>

</body>
</html>
