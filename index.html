<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:sans-serif;
background:#f5f7fb;
padding:20px;
}

h1{
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.balance{
font-size:36px;
font-weight:bold;
color:#2c7be5;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ddd;
}

button{
margin-top:10px;
padding:12px;
border:none;
border-radius:10px;
background:#2c7be5;
color:white;
width:100%;
}

.charts{
display:flex;
gap:20px;
flex-wrap:wrap;
}

canvas{
max-width:350px;
}

#history{
display:none;
}

.note{
font-size:12px;
color:#666;
}

</style>

</head>

<body>

<h1>💰 Money Tracker</h1>

<div class="card">
เงินคงเหลือ
<div class="balance" id="balance">0</div>
</div>

<div class="card">

<h2>เพิ่มรายการ</h2>

<select id="type" onchange="updateCategory()">
<option value="income">รายรับ</option>
<option value="expense">รายจ่าย</option>
</select>

<select id="category"></select>

<input id="amount" placeholder="จำนวนเงิน">

<input id="note" placeholder="รายละเอียด เช่น เงินเดือน / กาแฟ / ค่าทางด่วน">

<button onclick="save()">บันทึก</button>

</div>

<div class="card">

<h2>สัดส่วนการเงิน</h2>

<div class="charts">

<div>
<h4>ค่าใช้จ่าย</h4>
<canvas id="expenseChart"></canvas>
</div>

<div>
<h4>เงินเก็บ</h4>
<canvas id="savingChart"></canvas>
</div>

</div>

</div>

<div class="card">
<h2>เป้าหมาย</h2>
<canvas id="goalChart"></canvas>
</div>

<div class="card">

<button onclick="toggleHistory()">ดูประวัติ</button>

<div id="history"></div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzbpK_vp-WGzS-huLYhYCP_25mzcTZT5nR8uqzg8wnAzHQYR72H8ofl6BVoL1Om9UiXug/exec"

let expenseChart
let savingChart
let goalChart

function updateCategory(){

const type=document.getElementById("type").value
const category=document.getElementById("category")

if(type==="expense"){

category.innerHTML=`

<option value="house">บ้าน</option>
<option value="car">รถ</option>
<option value="child">ลูก</option>
<option value="food">กิน</option>
<option value="travel">เที่ยว</option>
<option value="fuel">น้ำมัน</option>
<option value="other">อื่นๆ</option>

`

}

if(type==="income"){

category.innerHTML=`
<option value="salary">เงินเดือน</option>
`

}

}

updateCategory()

async function load(){

const res=await fetch(API)
const data=await res.json()

let income=0
let expense=0

let house=0
let car=0
let child=0
let food=0
let travel=0
let fuel=0
let other=0

let expHouse=0
let expCar=0
let expChild=0
let expFood=0
let expTravel=0
let expFuel=0
let expOther=0

let historyHTML=""

data.forEach(t=>{

const amount=Number(t.amount)||0

if(t.type==="income"){

income+=amount

house+=amount*0.25
car+=amount*0.15
child+=amount*0.15
food+=amount*0.20
travel+=amount*0.10
fuel+=amount*0.10
other+=amount*0.05

}

if(t.type==="expense"){

expense+=amount

if(t.category==="house"){house-=amount;expHouse+=amount}
if(t.category==="car"){car-=amount;expCar+=amount}
if(t.category==="child"){child-=amount;expChild+=amount}
if(t.category==="food"){food-=amount;expFood+=amount}
if(t.category==="travel"){travel-=amount;expTravel+=amount}
if(t.category==="fuel"){fuel-=amount;expFuel+=amount}
if(t.category==="other"){other-=amount;expOther+=amount}

}

historyHTML+=`
<div>
${t.date} | ${t.category} | ${amount} บาท
<div class="note">${t.note||""}</div>
</div>
`

})

document.getElementById("balance").innerText=income-expense
document.getElementById("history").innerHTML=historyHTML

drawExpenseChart(expHouse,expCar,expChild,expFood,expTravel,expFuel,expOther)
drawSavingChart(house,car,child,food,travel,fuel,other)

loadGoals()

}

function drawExpenseChart(house,car,child,food,travel,fuel,other){

if(expenseChart) expenseChart.destroy()

expenseChart=new Chart(document.getElementById("expenseChart"),{
type:"pie",
data:{
labels:["บ้าน","รถ","ลูก","กิน","เที่ยว","น้ำมัน","อื่นๆ"],
datasets:[{
data:[house,car,child,food,travel,fuel,other],
backgroundColor:[
"#ff6b6b","#845ef7","#20c997",
"#ffd43b","#ffa94d","#4dabf7","#adb5bd"
]
}]
}
})

}

function drawSavingChart(house,car,child,food,travel,fuel,other){

if(savingChart) savingChart.destroy()

savingChart=new Chart(document.getElementById("savingChart"),{
type:"pie",
data:{
labels:["บ้าน","รถ","ลูก","กิน","เที่ยว","น้ำมัน","อื่นๆ"],
datasets:[{
data:[house,car,child,food,travel,fuel,other],
backgroundColor:[
"#69db7c","#845ef7","#20c997",
"#ffd43b","#ffa94d","#4dabf7","#adb5bd"
]
}]
}
})

}

async function loadGoals(){

try{

const res=await fetch(API+"?sheet=goals")
const data=await res.json()

const categories=["บ้าน","รถ","ลูก","กิน","เที่ยว","น้ำมัน","อื่นๆ"]

let percent=[]
let labelsFull=[]

categories.forEach(cat=>{

const found=data.find(g=>g.name===cat)

if(found){

const saved=Number(found.saved)
const target=Number(found.target)

const p=target>0?(saved/target)*100:0

percent.push(p)

labelsFull.push(
cat+" ("+
saved.toLocaleString()+
" / "+
target.toLocaleString()+
")"
)

}else{

percent.push(0)
labelsFull.push(cat+" (0 / 0)")

}

})

if(goalChart) goalChart.destroy()

goalChart=new Chart(document.getElementById("goalChart"),{
type:"bar",
data:{
labels:labelsFull,
datasets:[{
label:"ความคืบหน้า %",
data:percent,
backgroundColor:"#2c7be5"
}]
},
options:{
indexAxis:'y',
plugins:{
tooltip:{
callbacks:{
label:(ctx)=>ctx.raw.toFixed(1)+" %"
}
}
},
scales:{
x:{
max:100,
ticks:{callback:(v)=>v+"%"}
}
}
}
})

}catch(e){

console.log("no goals sheet")

}

}

async function save(){

const type=document.getElementById("type").value
const category=document.getElementById("category").value
const amount=document.getElementById("amount").value
const note=document.getElementById("note").value

await fetch(API,{
method:"POST",
body:JSON.stringify({
type:type,
category:category,
amount:amount,
note:note,
date:new Date().toLocaleDateString()
})
})

alert("บันทึกแล้ว")

location.reload()

}

function toggleHistory(){

const el=document.getElementById("history")

if(el.style.display==="none"){
el.style.display="block"
}else{
el.style.display="none"
}

}

load()

</script>

</body>
</html>
