<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Finance Dashboard</title>
</head>

<body>

<h1>Finance Dashboard</h1>

<h2>Goals</h2>
<div id="goals"></div>

<h2>Transactions</h2>
<div id="transactions"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwUI-sPYGV_7QQEkzv70klIzJbj6IFnETw0E134xrqCM8BILroVNDh6_wP-EjaLVCjVkw/exec";

fetch(API_URL)
.then(res=>res.json())
.then(data=>{

const goals = data.goals
const transactions = data.transactions

const goalBox = document.getElementById("goals")
const transBox = document.getElementById("transactions")

goals.forEach(g=>{
goalBox.innerHTML += `
<div>
${g.name} ${g.saved}/${g.target}
</div>`
})

transactions.forEach(t=>{
transBox.innerHTML += `
<div>
${t.date} ${t.category} ${t.amount}
</div>`
})

})

</script>

</body>
</html>
