<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:sans-serif;
padding:20px;
background:#f5f5f5;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
background:#4CAF50;
color:white;
}

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border-radius:10px;
display:none;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<h2>💰 Money Tracker</h2>

<div class="card">

เงินคงเหลือ

<h1 id="balance">0</h1>

</div>

<div class="card">

<h3>เพิ่มรายการ</h3>

<select id="type">
<option value="income">รายรับ</option>
<option value="expense">รายจ่าย</option>
</select>

<select id="category">

<option value="food">กิน</option>
<option value="travel">เที่ยว</option>
<option value="fuel">น้ำมัน</option>
<option value="future">เก็บอนาคต</option>

</select>

<input id="amount" placeholder="จำนวนเงิน">

<button onclick="save()">บันทึก</button>

</div>

<div class="card">
<h3>สัดส่วนค่าใช้จ่าย</h3>
<canvas id="pie"></canvas>
</div>

<div class="card">
<h3>เป้าหมาย</h3>
<canvas id="bar"></canvas>
</div>

<div class="popup" id="popup">
บันทึกแล้ว ✅
<br><br>
<button onclick="closePopup()">ปิด</button>
</div>

<script>

const API="PASTE_API_HERE"

async function load(){

const res=await fetch(API)
const data=await res.json()

let income=0
let expense=0

let food=0
let travel=0
let fuel=0
let future=0

data.forEach(t=>{

if(t.type=="income") income+=Number(t.amount)

if(t.type=="expense"){
expense+=Number(t.amount)

if(t.category=="food") food+=Number(t.amount)
if(t.category=="travel") travel+=Number(t.amount)
if(t.category=="fuel") fuel+=Number(t.amount)
if(t.category=="future") future+=Number(t.amount)

}

})

document.getElementById("balance").innerText=income-expense

drawPie(food,travel,fuel,future)

}

function drawPie(food,travel,fuel,future){

new Chart(document.getElementById("pie"),{

type:"pie",

data:{
labels:["กิน","เที่ยว","น้ำมัน","เก็บอนาคต"],

datasets:[{

data:[food,travel,fuel,future]

}]
}

})

}

async function save(){

const type=document.getElementById("type").value
const category=document.getElementById("category").value
const amount=document.getElementById("amount").value

await fetch(API,{

method:"POST",

body:JSON.stringify({

type:type,
category:category,
amount:amount,
date:new Date()

})

})

document.getElementById("popup").style.display="block"

load()

}

function closePopup(){

document.getElementById("popup").style.display="none"

}

load()

</script>

</body>
</html>
