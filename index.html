<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:sans-serif;
background:#f5f7fb;
padding:20px;
}

h1{
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.balance{
font-size:36px;
font-weight:bold;
color:#2c7be5;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ddd;
}

button{
margin-top:10px;
padding:12px;
border:none;
border-radius:10px;
background:#2c7be5;
color:white;
width:100%;
}

.charts{
display:flex;
gap:20px;
flex-wrap:wrap;
}

canvas{
max-width:350px;
}

#history{
display:none;
}

</style>

</head>

<body>

<h1>💰 Money Tracker</h1>

<div class="card">
เงินคงเหลือ
<div class="balance" id="balance">0</div>
</div>

<div class="card">

<h2>เพิ่มรายการ</h2>

<select id="type" onchange="updateCategory()">
<option value="income">รายรับ</option>
<option value="expense">รายจ่าย</option>
</select>

<select id="category"></select>

<input id="amount" placeholder="จำนวนเงิน">

<button onclick="save()">บันทึก</button>

</div>

<div class="card">

<h2>สัดส่วนการเงิน</h2>

<div class="charts">

<div>
<h4>ค่าใช้จ่าย</h4>
<canvas id="cashChart"></canvas>
</div>

<div>
<h4>เงินเก็บ</h4>
<canvas id="savingChart"></canvas>
</div>

</div>

</div>

<div class="card">
<h2>เป้าหมาย</h2>
<canvas id="goalChart"></canvas>
</div>

<div class="card">

<button onclick="toggleHistory()">ดูประวัติ</button>

<div id="history"></div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzbpK_vp-WGzS-huLYhYCP_25mzcTZT5nR8uqzg8wnAzHQYR72H8ofl6BVoL1Om9UiXug/exec"

const allocation={
บ้าน:0.25,
รถ:0.15,
ลูก:0.15,
กิน:0.20,
เที่ยว:0.10,
น้ำมัน:0.10,
อื่นๆ:0.05
};

async function loadData(){

const t=await fetch(API+"?sheet=transactions");
const transactions=await t.json();

const g=await fetch(API+"?sheet=goals");
const goals=await g.json();

renderIncomeExpense(transactions);

const savings=calculateSavings(transactions);
renderSavingsChart(savings);

renderGoals(goals);

}

function calculateSavings(transactions){

let income=0;

transactions.forEach(t=>{
if(t.type==="income"){
income+=Number(t.amount);
}
});

let result={};

Object.keys(allocation).forEach(cat=>{
result[cat]=income*allocation[cat];
});

return result;

}

function renderSavingsChart(data){

new Chart(document.getElementById("savingsChart"),{
type:'pie',
data:{
labels:Object.keys(data),
datasets:[{data:Object.values(data)}]
}
});

}

function renderGoals(goals){

new Chart(document.getElementById("goalsChart"),{
type:'bar',
data:{
labels:goals.map(g=>g.category),
datasets:[
{
label:'Saved',
data:goals.map(g=>Number(g.saved))
},
{
label:'Target',
data:goals.map(g=>Number(g.target))
}
]
}
});

}

function renderIncomeExpense(transactions){

let income=0;
let expense=0;

transactions.forEach(t=>{
if(t.type==="income") income+=Number(t.amount);
if(t.type==="expense") expense+=Number(t.amount);
});

new Chart(document.getElementById("cashChart"),{
type:'doughnut',
data:{
labels:['Income','Expense'],
datasets:[{data:[income,expense]}]
}
});

}

loadData();
