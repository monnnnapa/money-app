<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Money App</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>


<body>

<div class="container">

<h2>เงินกองกลางของเรา</h2>

<div class="totalBox">
฿ <span id="totalMoney">0</span>
</div>


<div class="card">

<canvas id="pieChart"></canvas>

</div>


<h3>การใช้เงินกองกลาง</h3>

<div id="transactionList"></div>


<h3>เพิ่มรายการ</h3>

<div class="formBox">

<select id="type">

<option value="expense">รายจ่าย</option>
<option value="income">รายรับ</option>

</select>


<select id="category">

<option value="ค่ากิน">ค่ากิน</option>
<option value="ค่าน้ำมัน">ค่าน้ำมัน</option>
<option value="ค่าเที่ยว">ค่าเที่ยว</option>
<option value="เงินเก็บ">เงินเก็บ</option>
<option value="เงินเดือน">เงินเดือน</option>

</select>


<input
id="amount"
type="number"
placeholder="จำนวนเงิน"
/>


<button onclick="saveTransaction()">

บันทึก

</button>

</div>


</div>


<script src="app.js"></script>

</body>

</html>
