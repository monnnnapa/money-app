function formatK(num){

if(num >= 1000){
return (num/1000).toFixed(1)+"K"
}

return num

}

async function loadGold(){

try{

const goldRes = await fetch("https://api.gold-api.com/price/XAU")
const goldData = await goldRes.json()

const goldUSD = goldData.price

/* ค่าเงินบาท */
const fxRes = await fetch("https://open.er-api.com/v6/latest/USD")
const fxData = await fxRes.json()

const usdToTHB = fxData.rates.THB

/* แปลงเป็นบาท */
const goldTHBperOunce = goldUSD * usdToTHB

/* 1 ounce = 31.1035g
   1 บาททอง = 15.244g
*/
const goldTHBperBaht = goldTHBperOunce * (15.244 / 31.1035)

document.getElementById("goldPrice").innerText =
"ราคาทองประมาณ: "+Math.round(goldTHBperBaht).toLocaleString()+" บาท"

}catch(e){

document.getElementById("goldPrice").innerText="โหลดราคาทองไม่ได้"

}

}

async function generateGoldTable(){

const tbody = document.querySelector("#goldTable tbody")

tbody.innerHTML=""

try{

const goldRes = await fetch("https://api.gold-api.com/price/XAU")
const goldData = await goldRes.json()

const goldUSD = goldData.price

const fxRes = await fetch("https://open.er-api.com/v6/latest/USD")
const fxData = await fxRes.json()

const usdToTHB = fxData.rates.THB

const goldTHBperOunce = goldUSD * usdToTHB
const goldTHBperBaht = goldTHBperOunce * (15.244 / 31.1035)

let price = goldTHBperBaht

for(let i=2;i>=0;i--){

price += Math.random()*400-200

const d = new Date()
d.setMonth(d.getMonth()-i)

const month = d.toLocaleString("th-TH",{month:"long",year:"numeric"})

const change = (Math.random()*300-150).toFixed(0)

const row = `
<tr>
<td>${month}</td>
<td>${Math.round(price).toLocaleString()}</td>
<td style="color:${change>=0?'green':'red'}">
${change>=0?'+':''}${change}
</td>
</tr>
`

tbody.innerHTML += row

}

}catch(e){

tbody.innerHTML="<tr><td colspan='3'>โหลดข้อมูลไม่ได้</td></tr>"

}

}

async function drawGoldChart(){

let labels=[]
let prices=[]

try{

/* ราคาทองปัจจุบัน */
const goldRes = await fetch("https://api.gold-api.com/price/XAU")
const goldData = await goldRes.json()

const goldUSD = goldData.price

/* ค่าเงินบาท */
const fxRes = await fetch("https://open.er-api.com/v6/latest/USD")
const fxData = await fxRes.json()

const usdToTHB = fxData.rates.THB

const goldTHBperOunce = goldUSD * usdToTHB
const currentPrice = goldTHBperOunce * (15.244 / 31.1035)

/* สร้างข้อมูลย้อนหลัง 12 เดือน */
let price = currentPrice

for(let i=11;i>=0;i--){

price += Math.random()*600-300

const d = new Date()
d.setMonth(d.getMonth()-i)

const month = d.toLocaleString("th-TH",{month:"short"})

labels.push(month)
prices.push(Math.round(price))

}

/* ให้เดือนสุดท้าย = ราคาปัจจุบันจริง */
prices[prices.length-1] = Math.round(currentPrice)

if(goldChart) goldChart.destroy()

goldChart = new Chart(document.getElementById("goldChart"),{

type:"line",

data:{
labels:labels,
datasets:[{
label:"ราคาทอง (บาท)",
data:prices,
borderColor:"#f59f00",
backgroundColor:"rgba(245,159,0,0.2)",
fill:true,
tension:0.3
}]
},

options:{
plugins:{
legend:{display:true}
},
scales:{
y:{
ticks:{
callback:v=>v.toLocaleString()
}
}
}
}

})

}catch(e){

console.log("โหลดกราฟไม่ได้")

}

}

async function load(){

const res=await fetch(API)

let house=0
let car=0
let child=0
/*let food=0
let travel=0
let fuel=0
let other=0*/

let expHouse=0
let expCar=0
let expChild=0
/*let expFood=0
let expTravel=0
let expFuel=0
let expOther=0*/

let historyHTML = `
<table>
<thead>
<tr>
<th>วันที่</th>
<th>หมวด</th>
<th>จำนวนเงิน</th>
<th>รายละเอียด</th>
</tr>
</thead>
<tbody>
`

const selectedMonth = monthFilter.value

const historyData = data
.filter(t=>{
    const tDate = new Date(t.date)
    const tMonth = tDate.toISOString().slice(0,7)
    return tMonth === selectedMonth
})
.sort((a,b)=> new Date(b.date) - new Date(a.date))
.slice(0,5)

data.forEach(t=>{

const tDate = new Date(t.date)
const tMonth = tDate.toISOString().slice(0,7)

if(tMonth !== selectedMonth) return

const amount = Number(t.amount) || 0

if(t.type==="income"){

income += amount

/* แบ่งเงินตามสัดส่วน */
house += amount * 0.1667
car   += amount * 0.2778
child += amount * 0.5556

}

if(t.type==="expense"){

expense += amount

/* หักเฉพาะหมวด */
if(t.category==="house"){
house -= amount
expHouse += amount
}

if(t.category==="car"){
car -= amount
expCar += amount
}

if(t.category==="child"){
child -= amount
expChild += amount
}

}

/* กันเงินติดลบ */
house = Math.max(house,0)
car = Math.max(car,0)
child = Math.max(child,0)

/* แปลงชื่อหมวด */
let catName = t.category

if(catName==="house") catName="วัตถุดิบ"
if(catName==="car") catName="น้ำมัน"
if(catName==="child") catName="เงินเก็บ"
if(catName==="salary") catName="เงินเดือน"


})

historyData.forEach(t=>{

const amount = Number(t.amount) || 0

let catName = t.category

if(catName==="house") catName="วัตถุดิบ"
if(catName==="car") catName="น้ำมัน"
if(catName==="child") catName="เงินเก็บ"
if(catName==="salary") catName="เงินเดือน"

historyHTML += `
<tr>
<td>${t.date}</td>
<td>${catName}</td>
<td>${amount}</td>
<td>${t.note || ""}</td>
</tr>
`

})

const totalBalance = house + car + child

const housePercent = totalBalance ? (house/totalBalance)*100 : 0
const carPercent = totalBalance ? (car/totalBalance)*100 : 0
const childPercent = totalBalance ? (child/totalBalance)*100 : 0

document.getElementById("balance").innerText=(income-expense).toLocaleString()
document.getElementById("history").innerHTML=historyHTML

drawExpenseChart(expHouse,expCar,expChild)
/*drawExpenseChart(expHouse,expCar,expChild,expFood,expTravel,expFuel,expOther)*/

}

function drawExpenseChart(house,car,child){
/*function drawExpenseChart(house,car,child,food,travel,fuel,other){*/

if(expenseChart) expenseChart.destroy()

expenseChart=new Chart(document.getElementById("expenseChart"),{
type:"pie",
data:{
labels:["วัตถุดิบ","น้ำมัน","เงินเก็บ"],
datasets:[{
data:[house,car,child],
backgroundColor:[
"#ff6b6b","#4dabf7","#20c997"
]
}]
},
plugins:[ChartDataLabels],
options:{
plugins:{
datalabels:{
color:"#000",
font:{
weight:"bold",
size:14
},
formatter:(value,ctx)=>{

const data = ctx.chart.data.datasets[0].data
const total = data.reduce((a,b)=>a+b,0)

const percent = total ? (value/total)*100 : 0

/* ซ่อนค่าถ้าเป็น 0 */
if(value === 0) return ""

/* ซ่อนถ้าชิ้นกราฟเล็กเกิน */
if(percent < 10) return ""

return `${value.toLocaleString()} (${percent.toFixed(0)}%)`

}
}
}
}
})

}

/* ซ่อนถ้าชิ้นกราฟเล็กเกิน */

}

async function save(){

const type=document.getElementById("type").value
const category=document.getElementById("category").value
const amount=document.getElementById("amount").value
const note=document.getElementById("note").value

await fetch(API,{
method:"POST",
body:JSON.stringify({
type:type,
category:category,
amount:amount,
note:note,
date:new Date().toISOString().split("T")[0]
})
})

alert("บันทึกแล้ว")

location.reload()

}

function toggleHistory(){

const el=document.getElementById("history")

}else{

}

}

function changePage(){

const page=document.getElementById("pageSelect").value

/* ซ่อนทุกหน้า */

document.getElementById("summaryPage").style.display="none"
document.getElementById("goldPage").style.display="none"
document.getElementById("mygoldPage").style.display="none"

/* แสดงหน้าที่เลือก */

if(page==="home"){
document.getElementById("homePage").style.display="block"
}

if(page==="summary"){
document.getElementById("summaryPage").style.display="block"
}

if(page==="gold"){
document.getElementById("goldPage").style.display="block"

drawGoldChart()

}

if(page==="mygold"){

}

}
