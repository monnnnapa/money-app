<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:sans-serif;
background:#f2f2f2;
padding:20px;
}

h1,h2{
margin:5px 0;
}

.card{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.balance{
font-size:36px;
font-weight:bold;
color:#2c7be5;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ddd;
}

button{
margin-top:10px;
padding:10px;
border:none;
border-radius:8px;
background:#2c7be5;
color:white;
width:100%;
}

#history{
display:none;
}

.popup{

position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
display:none;

}

.popup button{
background:#555;
}

</style>

</head>

<body>

<h1>💰 Money Tracker</h1>

<div class="card">

เงินคงเหลือ

<div class="balance" id="balance">0</div>

</div>

<div class="card">

<h2>เพิ่มรายการ</h2>

<select id="type">
<option value="income">รายรับ</option>
<option value="expense">รายจ่าย</option>
</select>

<select id="category">

<option value="food">กิน</option>
<option value="travel">เที่ยว</option>
<option value="fuel">น้ำมัน</option>
<option value="future">เก็บอนาคต</option>

</select>

<input id="amount" placeholder="จำนวนเงิน">

<button onclick="save()">บันทึก</button>

</div>

<div class="card">

<h2>สัดส่วนค่าใช้จ่าย</h2>

<canvas id="pie"></canvas>

</div>

<div class="card">

<h2>เป้าหมาย</h2>

<canvas id="bar"></canvas>

</div>

<div class="card">

<button onclick="toggleHistory()">ดูประวัติ</button>

<div id="history"></div>

</div>

<div class="popup" id="popup">

<h2>บันทึกแล้ว ✅</h2>

<button onclick="closePopup()">ปิด</button>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxietsrlh7CeLH-4sOmCMfKytzC8CQLj8_RxB3WRPFObrKAVuYElQuZiXsxIEpSyLkGCw/exec"

let pieChart
let barChart

async function load(){

const res=await fetch(API)

const data=await res.json()

let income=0
let expense=0

let food=0
let travel=0
let fuel=0
let future=0

let historyHTML=""

data.forEach(t=>{

if(t.type=="income") income+=Number(t.amount)

if(t.type=="expense"){

expense+=Number(t.amount)

if(t.category=="food") food+=Number(t.amount)
if(t.category=="travel") travel+=Number(t.amount)
if(t.category=="fuel") fuel+=Number(t.amount)
if(t.category=="future") future+=Number(t.amount)

}

historyHTML+=`
<div>
${t.date} - ${t.category} - ${t.amount}
</div>
`

})

document.getElementById("balance").innerText=income-expense

document.getElementById("history").innerHTML=historyHTML

drawPie(food,travel,fuel,future)

drawBar()

}

function drawPie(food,travel,fuel,future){

if(pieChart) pieChart.destroy()

pieChart=new Chart(

document.getElementById("pie"),

{
type:"pie",

data:{
labels:["กิน","เที่ยว","น้ำมัน","เก็บอนาคต"],

datasets:[{
data:[food,travel,fuel,future]
}]
}

}

)

}

function drawBar(){

if(barChart) barChart.destroy()

barChart=new Chart(

document.getElementById("bar"),

{
type:"bar",

data:{

labels:["บ้าน","รถ","ลูก"],

datasets:[{

label:"เงินเก็บ",

data:[300000,100000,50000]

}]

}

}

)

}

async function save(){

const type=document.getElementById("type").value
const category=document.getElementById("category").value
const amount=document.getElementById("amount").value

await fetch(API,{

method:"POST",

body:JSON.stringify({

type:type,
category:category,
amount:amount,
date:new Date().toLocaleDateString()

})

})

document.getElementById("popup").style.display="block"

load()

}

function closePopup(){

document.getElementById("popup").style.display="none"

}

function toggleHistory(){

const el=document.getElementById("history")

if(el.style.display=="none"){

el.style.display="block"

}else{

el.style.display="none"

}

}

load()

</script>

</body>
</html>
